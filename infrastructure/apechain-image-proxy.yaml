AWSTemplateFormatVersion: '2010-09-09'
Description: 'ApeChain NFT Raffle - Image Proxy Service'

Resources:
  # Lambda function to proxy NFT images and bypass CORS
  ApeChainImageProxy:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: apechain-raffle-image-proxy
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt ImageProxyRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        ZipFile: |
          // Fixed Lambda Image Proxy - Node.js 20 Compatible
          // Addresses timeout issues and improves error handling
          
          exports.handler = async (event) => {
              console.log('=== Lambda Image Proxy Started ===');
              console.log('Event:', JSON.stringify(event, null, 2));
              
              const imageUrl = event.queryStringParameters?.url;
              
              if (!imageUrl) {
                  console.log('❌ Missing URL parameter');
                  return {
                      statusCode: 400,
                      headers: {
                          'Access-Control-Allow-Origin': '*',
                          'Content-Type': 'application/json'
                      },
                      body: JSON.stringify({ error: 'Missing url parameter' })
                  };
              }
              
              console.log('🔍 Fetching URL:', imageUrl);
              
              try {
                  // Node.js 20 compatible timeout implementation
                  const controller = new AbortController();
                  const timeoutId = setTimeout(() => {
                      console.log('⏰ Request timeout after 8 seconds');
                      controller.abort();
                  }, 8000);
                  
                  const response = await fetch(imageUrl, {
                      headers: {
                          'User-Agent': 'ApeChain-NFT-Raffle/2.0',
                          'Accept': '*/*',
                          'Cache-Control': 'no-cache'
                      },
                      signal: controller.signal
                  });
                  
                  clearTimeout(timeoutId);
                  
                  console.log('📊 Response status:', response.status);
                  console.log('📋 Response headers:', Object.fromEntries(response.headers.entries()));
                  
                  if (!response.ok) {
                      console.log('❌ Response not OK:', response.status, response.statusText);
                      return {
                          statusCode: response.status,
                          headers: {
                              'Access-Control-Allow-Origin': '*',
                              'Content-Type': 'application/json'
                          },
                          body: JSON.stringify({ 
                              error: `HTTP ${response.status}: ${response.statusText}`,
                              url: imageUrl
                          })
                      };
                  }
                  
                  const contentType = response.headers.get('content-type') || 'application/octet-stream';
                  console.log('📄 Content type:', contentType);
                  
                  // Handle JSON responses (metadata)
                  if (contentType.includes('application/json') || contentType.includes('text/plain')) {
                      const text = await response.text();
                      console.log('✅ JSON response length:', text.length);
                      
                      // Validate JSON
                      try {
                          JSON.parse(text);
                      } catch (jsonError) {
                          console.log('⚠️ Invalid JSON response, treating as text');
                      }
                      
                      return {
                          statusCode: 200,
                          headers: {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                              'Cache-Control': 'public, max-age=3600'
                          },
                          body: text
                      };
                  }
                  
                  // Handle binary responses (images)
                  const arrayBuffer = await response.arrayBuffer();
                  const buffer = Buffer.from(arrayBuffer);
                  console.log('✅ Binary response size:', buffer.length, 'bytes');
                  
                  // Validate image size (max 10MB)
                  if (buffer.length > 10 * 1024 * 1024) {
                      console.log('❌ Image too large:', buffer.length);
                      return {
                          statusCode: 413,
                          headers: {
                              'Access-Control-Allow-Origin': '*',
                              'Content-Type': 'application/json'
                          },
                          body: JSON.stringify({ 
                              error: 'Image too large (max 10MB)',
                              size: buffer.length
                          })
                      };
                  }
                  
                  return {
                      statusCode: 200,
                      headers: {
                          'Content-Type': contentType,
                          'Access-Control-Allow-Origin': '*',
                          'Cache-Control': 'public, max-age=86400',
                          'Content-Length': buffer.length.toString()
                      },
                      body: buffer.toString('base64'),
                      isBase64Encoded: true
                  };
                  
              } catch (error) {
                  console.error('💥 Error occurred:', error);
                  console.error('Error name:', error.name);
                  console.error('Error message:', error.message);
                  console.error('Error stack:', error.stack);
                  
                  // Handle specific error types
                  let errorMessage = 'Proxy request failed';
                  let statusCode = 500;
                  
                  if (error.name === 'AbortError') {
                      errorMessage = 'Request timeout (8 seconds)';
                      statusCode = 408;
                  } else if (error.name === 'TypeError' && error.message.includes('fetch')) {
                      errorMessage = 'Network connection failed';
                      statusCode = 502;
                  }
                  
                  return {
                      statusCode: statusCode,
                      headers: {
                          'Access-Control-Allow-Origin': '*',
                          'Content-Type': 'application/json'
                      },
                      body: JSON.stringify({ 
                          error: errorMessage,
                          message: error.message,
                          name: error.name,
                          url: imageUrl
                      })
                  };
              }
          };

  # IAM role for Lambda execution
  ImageProxyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: apechain-raffle-image-proxy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # API Gateway for the Lambda proxy with throttling
  ImageProxyApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: apechain-image-proxy-api
      Description: API Gateway for ApeChain NFT image proxy with rate limiting
      EndpointConfiguration:
        Types:
          - REGIONAL
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'execute-api:Invoke'
            Resource: '*'
          - Effect: Deny
            Principal: '*'
            Action: 'execute-api:Invoke'
            Resource: '*'
            Condition:
              StringNotEquals:
                'aws:SecureTransport': 'true'

  # API Gateway resource for /proxy path
  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ImageProxyApi
      ParentId: !GetAtt ImageProxyApi.RootResourceId
      PathPart: proxy

  # API Gateway method for GET /proxy
  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ImageProxyApi
      ResourceId: !Ref ProxyResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApeChainImageProxy.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true

  # API Gateway deployment with throttling
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ProxyMethod
    Properties:
      RestApiId: !Ref ImageProxyApi
      StageName: prod

  # Usage Plan for rate limiting
  ApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiDeployment
    Properties:
      UsagePlanName: apechain-image-proxy-usage-plan
      Description: Rate limiting for image proxy API
      ApiStages:
        - ApiId: !Ref ImageProxyApi
          Stage: prod
      Throttle:
        BurstLimit: 100  # Allow bursts up to 100 requests
        RateLimit: 50    # Sustained rate of 50 requests per second
      Quota:
        Limit: 10000     # 10,000 requests per day
        Period: DAY

  # Permission for API Gateway to invoke Lambda
  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApeChainImageProxy
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImageProxyApi}/*/GET/proxy'

Outputs:
  ImageProxyEndpoint:
    Description: 'ApeChain Raffle Image Proxy URL'
    Value: !Sub 'https://${ImageProxyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/proxy'
    Export:
      Name: !Sub '${AWS::StackName}-ImageProxyUrl'
  
  LambdaFunctionName:
    Description: 'Lambda Function Name'
    Value: !Ref ApeChainImageProxy
    
  Region:
    Description: 'Deployed Region'
    Value: !Ref AWS::Region