AWSTemplateFormatVersion: '2010-09-09'
Description: 'ApeChain NFT Raffle - NFT Proxy Service (image proxy + Alchemy NFT API)'

Parameters:
  AlchemyApiKey:
    Type: String
    NoEcho: true
    Description: Alchemy API key for NFT metadata and ownership queries
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment
  S3BucketName:
    Type: String
    Description: S3 bucket where the Lambda zip is stored

Resources:
  # Lambda function to proxy NFT images and bypass CORS
  ApeChainImageProxy:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'apechain-raffle-nft-proxy-${Environment}'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt ImageProxyRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Ref S3BucketName
        S3Key: lambda/nft-proxy.zip
        # Source: lambda/nft-proxy/index.js
      Environment:
        Variables:
          ALCHEMY_API_KEY: !Ref AlchemyApiKey
          ENVIRONMENT: !Ref Environment
          NODE_ENV: !Ref Environment

  # IAM role for Lambda execution
  ImageProxyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'apechain-nft-proxy-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # API Gateway for the Lambda proxy with throttling
  ImageProxyApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'apechain-nft-proxy-api-${Environment}'
      Description: !Sub 'ApeChain NFT proxy API - ${Environment}'
      EndpointConfiguration:
        Types:
          - REGIONAL
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'execute-api:Invoke'
            Resource: '*'
          - Effect: Deny
            Principal: '*'
            Action: 'execute-api:Invoke'
            Resource: '*'
            Condition:
              StringNotEquals:
                'aws:SecureTransport': 'true'

  # API Gateway resource for /proxy path
  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ImageProxyApi
      ParentId: !GetAtt ImageProxyApi.RootResourceId
      PathPart: proxy

  # API Gateway method for GET /proxy
  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ImageProxyApi
      ResourceId: !Ref ProxyResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApeChainImageProxy.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true

  # API Gateway deployment with throttling
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ProxyMethod
    Properties:
      RestApiId: !Ref ImageProxyApi
      StageName: prod

  # Usage Plan for rate limiting
  ApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiDeployment
    Properties:
      UsagePlanName: !Sub 'apechain-nft-proxy-usage-plan-${Environment}'
      Description: !Sub 'Rate limiting for NFT proxy API - ${Environment}'
      ApiStages:
        - ApiId: !Ref ImageProxyApi
          Stage: prod
      Throttle:
        BurstLimit: 100  # Allow bursts up to 100 requests
        RateLimit: 50    # Sustained rate of 50 requests per second
      Quota:
        Limit: 10000     # 10,000 requests per day
        Period: DAY

  # Permission for API Gateway to invoke Lambda
  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApeChainImageProxy
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImageProxyApi}/*/GET/proxy'

Outputs:
  ImageProxyEndpoint:
    Description: 'ApeChain Raffle Image Proxy URL'
    Value: !Sub 'https://${ImageProxyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/proxy'
    Export:
      Name: !Sub '${AWS::StackName}-ImageProxyUrl'
  
  LambdaFunctionName:
    Description: 'Lambda Function Name'
    Value: !Ref ApeChainImageProxy
    
  Region:
    Description: 'Deployed Region'
    Value: !Ref AWS::Region