AWSTemplateFormatVersion: '2010-09-09'
Description: 'ApeChain NFT Raffle - Image Proxy Service'

Resources:
  # Lambda function to proxy NFT images and bypass CORS
  ApeChainImageProxy:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: apechain-raffle-image-proxy
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt ImageProxyRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              const imageUrl = event.queryStringParameters?.url;
              
              if (!imageUrl) {
                  return {
                      statusCode: 400,
                      headers: {
                          'Access-Control-Allow-Origin': '*',
                          'Content-Type': 'application/json'
                      },
                      body: JSON.stringify({ error: 'Missing url parameter' })
                  };
              }
              
              try {
                  const response = await fetch(imageUrl, {
                      headers: {
                          'User-Agent': 'ApeChain-NFT-Raffle/1.0'
                      }
                  });
                  
                  if (!response.ok) {
                      return {
                          statusCode: response.status,
                          headers: {
                              'Access-Control-Allow-Origin': '*',
                              'Content-Type': 'application/json'
                          },
                          body: JSON.stringify({ 
                              error: `HTTP ${response.status}: ${response.statusText}` 
                          })
                      };
                  }
                  
                  const contentType = response.headers.get('content-type') || 'application/octet-stream';
                  
                  // Handle JSON responses (metadata)
                  if (contentType.includes('application/json') || contentType.includes('text/plain')) {
                      const text = await response.text();
                      return {
                          statusCode: 200,
                          headers: {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                              'Cache-Control': 'public, max-age=3600'
                          },
                          body: text
                      };
                  }
                  
                  // Handle binary responses (images)
                  const buffer = await response.buffer();
                  
                  return {
                      statusCode: 200,
                      headers: {
                          'Content-Type': contentType,
                          'Access-Control-Allow-Origin': '*',
                          'Cache-Control': 'public, max-age=86400'
                      },
                      body: buffer.toString('base64'),
                      isBase64Encoded: true
                  };
              } catch (error) {
                  return {
                      statusCode: 500,
                      headers: {
                          'Access-Control-Allow-Origin': '*',
                          'Content-Type': 'application/json'
                      },
                      body: JSON.stringify({ 
                          error: 'Proxy request failed',
                          message: error.message 
                      })
                  };
              }
          };

  # IAM role for Lambda execution
  ImageProxyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: apechain-raffle-image-proxy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # Function URL for direct HTTP access
  ImageProxyUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref ApeChainImageProxy
      AuthType: NONE
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
        AllowHeaders:
          - "*"
        MaxAge: 86400

Outputs:
  ImageProxyEndpoint:
    Description: 'ApeChain Raffle Image Proxy URL'
    Value: !GetAtt ImageProxyUrl.FunctionUrl
    Export:
      Name: !Sub '${AWS::StackName}-ImageProxyUrl'
  
  LambdaFunctionName:
    Description: 'Lambda Function Name'
    Value: !Ref ApeChainImageProxy
    
  Region:
    Description: 'Deployed Region'
    Value: !Ref AWS::Region