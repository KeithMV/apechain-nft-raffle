AWSTemplateFormatVersion: '2010-09-09'
Description: 'ApeChain NFT Raffle - Image Proxy Service'

Resources:
  # Lambda function to proxy NFT images and bypass CORS
  ApeChainImageProxy:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: apechain-raffle-image-proxy
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt ImageProxyRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              const imageUrl = event.queryStringParameters?.url;
              
              if (!imageUrl) {
                  return {
                      statusCode: 400,
                      headers: {
                          'Access-Control-Allow-Origin': '*',
                          'Content-Type': 'application/json'
                      },
                      body: JSON.stringify({ error: 'Missing url parameter' })
                  };
              }
              
              try {
                  const response = await fetch(imageUrl, {
                      headers: {
                          'User-Agent': 'ApeChain-NFT-Raffle/1.0'
                      },
                      timeout: 10000  // 10 second timeout
                  });
                  
                  if (!response.ok) {
                      return {
                          statusCode: response.status,
                          headers: {
                              'Access-Control-Allow-Origin': '*',
                              'Content-Type': 'application/json'
                          },
                          body: JSON.stringify({ 
                              error: `HTTP ${response.status}: ${response.statusText}` 
                          })
                      };
                  }
                  
                  const contentType = response.headers.get('content-type') || 'application/octet-stream';
                  
                  // Handle JSON responses (metadata)
                  if (contentType.includes('application/json') || contentType.includes('text/plain')) {
                      const text = await response.text();
                      return {
                          statusCode: 200,
                          headers: {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*',
                              'Cache-Control': 'public, max-age=3600'
                          },
                          body: text
                      };
                  }
                  
                  // Handle binary responses (images)
                  const arrayBuffer = await response.arrayBuffer();
                  const buffer = Buffer.from(arrayBuffer);
                  
                  return {
                      statusCode: 200,
                      headers: {
                          'Content-Type': contentType,
                          'Access-Control-Allow-Origin': '*',
                          'Cache-Control': 'public, max-age=86400'
                      },
                      body: buffer.toString('base64'),
                      isBase64Encoded: true
                  };
              } catch (error) {
                  return {
                      statusCode: 500,
                      headers: {
                          'Access-Control-Allow-Origin': '*',
                          'Content-Type': 'application/json'
                      },
                      body: JSON.stringify({ 
                          error: 'Proxy request failed',
                          message: error.message 
                      })
                  };
              }
          };

  # IAM role for Lambda execution
  ImageProxyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: apechain-raffle-image-proxy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # API Gateway for the Lambda proxy
  ImageProxyApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: apechain-image-proxy-api
      Description: API Gateway for ApeChain NFT image proxy
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway resource for /proxy path
  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ImageProxyApi
      ParentId: !GetAtt ImageProxyApi.RootResourceId
      PathPart: proxy

  # API Gateway method for GET /proxy
  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ImageProxyApi
      ResourceId: !Ref ProxyResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApeChainImageProxy.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseHeaders:
            Access-Control-Allow-Origin: true

  # API Gateway deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ProxyMethod
    Properties:
      RestApiId: !Ref ImageProxyApi
      StageName: prod

  # Permission for API Gateway to invoke Lambda
  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApeChainImageProxy
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub '${ImageProxyApi}/*/GET/proxy'

Outputs:
  ImageProxyEndpoint:
    Description: 'ApeChain Raffle Image Proxy URL'
    Value: !Sub 'https://${ImageProxyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/proxy'
    Export:
      Name: !Sub '${AWS::StackName}-ImageProxyUrl'
  
  LambdaFunctionName:
    Description: 'Lambda Function Name'
    Value: !Ref ApeChainImageProxy
    
  Region:
    Description: 'Deployed Region'
    Value: !Ref AWS::Region