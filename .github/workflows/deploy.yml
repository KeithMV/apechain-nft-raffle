name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd contracts && npm install --legacy-peer-deps
        cd ../frontend && npm install
        
    - name: Build contracts
      run: cd contracts && npm run compile
      
    - name: Build frontend
      run: cd frontend && npm run build
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Deploy to S3
      run: |
        aws s3 sync frontend/build/ s3://apechain-nft-raffle-856872546342-us-east-1/ --delete
        aws cloudfront create-invalidation --distribution-id E3789QHQWV0CRS --paths "/*"