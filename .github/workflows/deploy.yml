name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install frontend dependencies
      run: cd frontend && yarn install
      
    - name: Validate environment variables
      run: |
        if [ -z "${{ secrets.WALLETCONNECT_PROJECT_ID }}" ]; then
          echo "Warning: WALLETCONNECT_PROJECT_ID secret not set, using fallback"
          echo "REACT_APP_WALLETCONNECT_PROJECT_ID=7aca6566c4e099d07b70a3c27981ac9f" >> $GITHUB_ENV
        else
          echo "REACT_APP_WALLETCONNECT_PROJECT_ID=${{ secrets.WALLETCONNECT_PROJECT_ID }}" >> $GITHUB_ENV
        fi
        
    - name: Build frontend
      run: cd frontend && CI=false yarn build
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Deploy to S3
      run: |
        aws s3 sync frontend/build/ s3://apechain-nft-raffle-856872546342-us-east-1/ --delete
        aws cloudfront create-invalidation --distribution-id EH7R5RBQF66DL --paths "/*"