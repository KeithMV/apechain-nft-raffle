name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        rm -rf node_modules yarn.lock
        yarn install
      
    - name: Build frontend for staging
      run: |
        cd frontend
        CI=false yarn build:staging
      env:
        REACT_APP_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
        REACT_APP_APP_NAME: "ApeChain NFT Raffles (STAGING)"
        REACT_APP_APP_URL: "https://staging.apechainraffles.io"
        REACT_APP_ENV: "staging"
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Deploy to Staging S3
      run: |
        aws s3 sync frontend/build/ s3://apechain-nft-raffle-staging-856872546342-us-east-1/ --delete
        aws cloudfront create-invalidation --distribution-id E2OQG8N4GFFTXI --paths "/*"
        
    - name: Staging deployment complete
      run: |
        echo "✅ Staging deployment complete!"
        echo "🌐 Staging URL: https://staging.apechainraffles.io"
        echo "⏱️ Cache invalidation may take 1-2 minutes to propagate"