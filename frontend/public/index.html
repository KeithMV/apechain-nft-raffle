    <!-- CRITICAL: Mobile-Safe SES Configuration - Must load FIRST -->
    <script>
      // Mobile-Safe SES Configuration - Inline for immediate execution
      (function() {
        // Detect Mobile Safari specifically
        const isMobileSafari = (() => {
          if (typeof window === 'undefined' || !window.navigator) return false;
          
          const userAgent = window.navigator.userAgent;
          const isIOS = /iPad|iPhone|iPod/.test(userAgent);
          const isSafari = /Safari/.test(userAgent) && !/Chrome/.test(userAgent);
          
          return isIOS && isSafari;
        })();

        // Configure SES for mobile compatibility
        if (isMobileSafari) {
          console.log('🍎 [SES-MOBILE] Configuring SES for Mobile Safari compatibility');
          
          // Set mobile-safe SES configuration before any SES initialization
          window.__SES_MOBILE_SAFE__ = true;
          
          // Configure SES options for mobile compatibility
          window.__SES_OPTIONS__ = {
            // Disable aggressive lockdown features that break on Mobile Safari
            errorTaming: 'unsafe', // Allow more permissive error handling
            stackFiltering: 'concise', // Reduce stack trace processing
            overrideTaming: 'min', // Minimal override protection
            consoleTaming: 'unsafe', // Allow full console access for debugging
            
            // Mobile-specific optimizations
            transforms: [],
            __allowUnsafeMonkeyPatching__: true, // Required for mobile wallet compatibility
          };
          
          // Polyfill for Mobile Safari SES compatibility
          if (!window.harden) {
            window.harden = function(obj) {
              // Lightweight harden implementation for mobile
              if (obj && typeof obj === 'object') {
                try {
                  return Object.freeze(obj);
                } catch (e) {
                  // Fallback if freezing fails on mobile
                  return obj;
                }
              }
              return obj;
            };
          }
          
          // Override problematic SES functions for mobile
          const originalLockdown = window.lockdown;
          window.lockdown = function mobileSafeLockdown(options) {
            console.log('🍎 [SES-MOBILE] Applying mobile-safe lockdown');
            
            // Merge with mobile-safe options
            const mobileOptions = Object.assign({}, window.__SES_OPTIONS__, options || {});
            
            try {
              if (originalLockdown) {
                return originalLockdown(mobileOptions);
              } else {
                // Minimal lockdown for mobile if SES not available
                console.log('🍎 [SES-MOBILE] Using minimal lockdown for mobile compatibility');
                return Promise.resolve();
              }
            } catch (error) {
              console.warn('🍎 [SES-MOBILE] SES lockdown failed, using safe fallback:', error);
              // Safe fallback - don't break the app
              return Promise.resolve();
            }
          };
          
          console.log('✅ [SES-MOBILE] Mobile Safari SES configuration applied');
        } else {
          console.log('🖥️ [SES-DESKTOP] Using standard SES configuration for desktop');
        }

        // Export for debugging
        window.__SES_MOBILE_DEBUG__ = {
          isMobileSafari: isMobileSafari,
          options: window.__SES_OPTIONS__,
          timestamp: new Date().toISOString(),
        };
      })();
    </script>
