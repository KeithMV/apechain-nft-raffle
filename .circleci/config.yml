version: 2.1

jobs:
  build-frontend-staging:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - run:
          name: Install frontend dependencies
          command: |
            cd frontend
            rm -rf node_modules yarn.lock
            yarn install --network-timeout 300000
      - run:
          name: Run frontend tests
          command: |
            cd frontend
            yarn test --coverage --run --passWithNoTests
      - run:
          name: Build frontend for staging
          command: |
            cd frontend
            rm -rf build/ node_modules/.cache/
            CI=false yarn build
          environment:
            REACT_APP_APP_NAME: "ApeChain NFT Raffles (STAGING)"
            REACT_APP_APP_URL: "https://staging.apechainraffles.io"
            REACT_APP_ENV: "staging"
            REACT_APP_NETWORK: "apechain"
            REACT_APP_CHAIN_ID: "33139"
            REACT_APP_APECHAIN_RPC_URL: "https://apechain.calderachain.xyz/http"
            REACT_APP_CONTRACT_ADDRESS: "0x1627E7e63b63878E61f91D336385a59B1747934a"
            REACT_APP_WALLETCONNECT_PROJECT_ID: "b848c907908cee0c1bcf0ab0493da6c4"
      - persist_to_workspace:
          root: .
          paths:
            - frontend/build

  build-frontend-production:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - run:
          name: Install frontend dependencies
          command: |
            cd frontend
            rm -rf node_modules yarn.lock
            yarn install --network-timeout 300000
      - run:
          name: Run frontend tests
          command: |
            cd frontend
            yarn test --coverage --run --passWithNoTests
      - run:
          name: Build frontend for production
          command: |
            cd frontend
            rm -rf build/ node_modules/.cache/
            CI=false yarn build
          environment:
            REACT_APP_APP_NAME: "ApeChain NFT Raffles"
            REACT_APP_APP_URL: "https://apechainraffles.io"
            REACT_APP_ENV: "production"
            REACT_APP_NETWORK: "apechain"
            REACT_APP_CHAIN_ID: "33139"
            REACT_APP_APECHAIN_RPC_URL: "https://apechain.calderachain.xyz/http"
            REACT_APP_CONTRACT_ADDRESS: "0x1627E7e63b63878E61f91D336385a59B1747934a"
            REACT_APP_WALLETCONNECT_PROJECT_ID: "b848c907908cee0c1bcf0ab0493da6c4"
      - persist_to_workspace:
          root: .
          paths:
            - frontend/build

  build-contracts:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-cache-v1-{{ checksum "contracts/package-lock.json" }}
            - npm-cache-v1-
      - run:
          name: Install contract dependencies
          command: |
            cd contracts
            npm install --prefer-offline
      - save_cache:
          key: npm-cache-v1-{{ checksum "contracts/package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Compile contracts
          command: |
            cd contracts
            npx hardhat compile
      - persist_to_workspace:
          root: .
          paths:
            - contracts/artifacts/
            - contracts/cache/
            - contracts/node_modules/

  test:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install Python tools for security analysis
          command: |
            sudo apt-get update && sudo apt-get install -y python3-pip
            pip3 install slither-analyzer --break-system-packages
      - run:
          name: Security Analysis with Slither
          command: |
            cd contracts
            echo "Running Slither security analysis..."
            slither . --json slither-report.json || true
            echo "Security analysis complete - check slither-report.json for details"
      - run:
          name: Validate Contract Compilation
          command: |
            cd contracts
            echo "Validating contract compilation..."
            npx hardhat compile
            echo "✅ Contract compilation successful"
      - run:
          name: Validate CDK infrastructure
          command: |
            echo "Validating CDK infrastructure..."
            cd infrastructure
            yarn install
            yarn build
            yarn cdk synth > /dev/null
            echo "✅ CDK infrastructure validation complete!"

  deploy-staging:
    docker:
      - image: cimg/aws:2024.03
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Deploy to Staging S3
          command: |
            aws s3 sync frontend/build/ s3://apechain-nft-raffle-staging-856872546342-us-east-1/ --delete
            aws cloudfront create-invalidation --distribution-id E2OQG8N4GFFTXI --paths "/*"
            echo "✅ Staging deployment complete!"
            echo "🌐 Staging URL: https://staging.apechainraffles.io"

  deploy-production:
    docker:
      - image: cimg/aws:2024.03
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Deploy to Production S3
          command: |
            # Get CDK stack outputs
            BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name RaffleInfrastructureStack --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' --output text)
            DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name RaffleInfrastructureStack --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' --output text)
            
            echo "📦 Deploying to bucket: $BUCKET_NAME"
            echo "🌐 Invalidating CloudFront: $DISTRIBUTION_ID"
            
            # Sync frontend build to S3 bucket
            aws s3 sync frontend/build/ s3://$BUCKET_NAME --delete
            
            # Invalidate CloudFront cache
            aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
            
            echo "✅ Production deployment complete!"

workflows:
  version: 2
  staging_deploy:
    jobs:
      - build-frontend-staging:
          filters:
            branches:
              only: develop
      - build-contracts:
          filters:
            branches:
              only: develop
      - test:
          requires:
            - build-frontend-staging
            - build-contracts
          filters:
            branches:
              only: develop
      - deploy-staging:
          requires:
            - test
          filters:
            branches:
              only: develop
  
  production_deploy:
    jobs:
      - build-frontend-production:
          filters:
            branches:
              only: main
      - build-contracts:
          filters:
            branches:
              only: main
      - test:
          requires:
            - build-frontend-production
            - build-contracts
          filters:
            branches:
              only: main
      - deploy-production:
          requires:
            - test
          filters:
            branches:
              only: main