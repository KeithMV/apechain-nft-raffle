version: 2.1

jobs:
  build-frontend:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - restore_cache:
          keys:
            - yarn-cache-v2-{{ checksum "frontend/yarn.lock" }}
            - yarn-cache-v2-
      - run:
          name: Install frontend dependencies
          command: |
            cd frontend
            # Try yarn with multiple registries and network configurations
            yarn install --frozen-lockfile --prefer-offline --network-timeout 300000 || \
            yarn install --frozen-lockfile --registry https://registry.npmjs.org/ --network-timeout 300000 || \
            yarn install --frozen-lockfile --registry https://registry.npmmirror.com/ --network-timeout 300000 || \
            yarn install --registry https://registry.npmjs.org/ --network-timeout 300000
      - save_cache:
          key: yarn-cache-v2-{{ checksum "frontend/yarn.lock" }}
          paths:
            - ~/.cache/yarn
      - run:
          name: Run frontend tests
          command: |
            cd frontend
            yarn test --coverage --watchAll=false --passWithNoTests
      - run:
          name: Build frontend
          command: |
            cd frontend
            echo "🔍 Checking build configuration..."
            echo "Node version: $(node --version)"
            echo "Yarn version: $(yarn --version)"
            echo "Package.json build script: $(grep '"build"' package.json)"
            echo "Environment files:"
            ls -la .env* || echo "No .env files found"
            echo "🧹 Clean build - removing old artifacts..."
            rm -rf build/ node_modules/.cache/
            echo "🏗️ Starting clean build..."
            CI=false yarn build
            echo "✅ Build complete - checking output..."
            ls -la build/static/js/main.*.js
            echo "📎 Verifying build directory for workspace persistence..."
            ls -la build/ | head -10
      - persist_to_workspace:
          root: .
          paths:
            - frontend/build/
            - frontend/node_modules/

  build-contracts:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-cache-v1-{{ checksum "contracts/package-lock.json" }}
            - npm-cache-v1-
      - run:
          name: Install contract dependencies
          command: |
            cd contracts
            npm install --prefer-offline
      - save_cache:
          key: npm-cache-v1-{{ checksum "contracts/package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Compile contracts
          command: |
            cd contracts
            npx hardhat compile
      - persist_to_workspace:
          root: .
          paths:
            - contracts/artifacts/
            - contracts/cache/
            - contracts/node_modules/

  test:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install Python tools for security analysis
          command: |
            sudo apt-get update && sudo apt-get install -y python3-pip
            pip3 install slither-analyzer
      - run:
          name: Security Analysis with Slither
          command: |
            cd contracts
            echo "Running Slither security analysis..."
            slither . --json slither-report.json || true
            echo "Security analysis complete - check slither-report.json for details"
      - run:
          name: Validate Contract Compilation
          command: |
            cd contracts
            echo "Validating contract compilation..."
            npx hardhat compile
            echo "✅ Contract compilation successful"
      - run:
          name: Validate CDK infrastructure
          command: |
            echo "Validating CDK infrastructure..."
            cd infrastructure
            yarn install
            yarn build
            yarn cdk synth > /dev/null
            echo "✅ CDK infrastructure validation complete!"

  deploy:
    docker:
      - image: cimg/aws:2024.03
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Deploy to AWS S3 via CDK
          command: |
            # Get CDK stack outputs
            BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name RaffleInfrastructureStack --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' --output text)
            DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name RaffleInfrastructureStack --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' --output text)
            
            echo "📦 Deploying to bucket: $BUCKET_NAME"
            echo "🌐 Invalidating CloudFront: $DISTRIBUTION_ID"
            
            # Sync frontend build to S3 bucket
            aws s3 sync frontend/build/ s3://$BUCKET_NAME --delete
            
            # Invalidate CloudFront cache
            aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
            
            echo "✅ CDK-managed deployment complete!"

workflows:
  version: 2
  build_test_deploy:
    jobs:
      - build-frontend
      - build-contracts
      - test:
          requires:
            - build-frontend
            - build-contracts
      - deploy:
          requires:
            - test